<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="Luis Zegarra">
  <meta name="description" content="Página Contact del sitio Splash White Water Rafting">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/rafting.css">

  <title>Contact - Splash White Water Rafting</title>
</head>

<body>
  <header>
    <img src="images/logo.png" alt="Splash White Water Rafting Logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
   <!-- Company contact info section -->
   <section class="contact-info">
    <h1>Contact Us</h1>
    <p><strong>Address:</strong> 123 River Road, Rapids City</p>
    <p><strong>Phone:</strong> (555) 123-4567</p>
    <p><strong>Email:</strong> info@whiterafting.com</p>

    <!-- Embedded Google Map without inline style -->
    <iframe 
    class="map-iframe"
    src="https://www.google.com/maps/embed?pb=!1m18..."
    width="600"
    height="450"
    allowfullscreen
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
  
  </section>

  <!-- Employee profiles -->
  <section class="team">
    <h2>Meet Our Team</h2>
    <figure>
      <img src="images/employee1.jpg" alt="Employee 1" />
      <figcaption>John Doe - Customer Support</figcaption>
    </figure>
    <figure>
      <img src="images/employee2.jpg" alt="Employee 2" />
      <figcaption>Jane Smith - Rafting Guide</figcaption>
    </figure>
    <figure>
      <img src="images/employee3.jpg" alt="Employee 3" />
      <figcaption>Mike Johnson - Reservations Specialist</figcaption>
    </figure>
  </section>

  <!-- Contact form -->
  <section class="contact-form">
    <h2>Send Us a Message</h2>
    <form action="process_form.php" method="post">
      <!-- Name field -->
      <label for="userName">Name:</label>
      <input type="text" id="userName" name="userName" />

      <!-- Email field -->
      <label for="userEmail">Email:</label>
      <input type="email" id="userEmail" name="userEmail" />

      <!-- Radio buttons for message purpose -->
      <fieldset>
        <legend>Message Purpose</legend>
        <label>
          <input type="radio" name="purpose" value="General Inquiry" />
          General Inquiry
        </label>
        <label>
          <input type="radio" name="purpose" value="Reservation Question" />
          Reservation Question
        </label>
        <label>
          <input type="radio" name="purpose" value="Website Suggestion" />
          Website Suggestion
        </label>
      </fieldset>

      <!-- Message textarea -->
      <label for="message">Message:</label>
      <textarea id="message" name="message"></textarea>

      <!-- Newsletter subscription checkbox -->
      <label>
        <input type="checkbox" name="subscribe" value="yes" />
        Please subscribe me to the monthly newsletter
      </label>

      <!-- Submit button -->
      <button type="submit">Send Your Message</button>
    </form>
  </section>

  </main>

  <footer>
    <p>&copy; 2025 Splash White Water Rafting | Developer: Luis Zegarra</p>
    <div class="social-icons">
      <a href="https://www.facebook.com/" target="_blank">
        <img src="images/social1.png" alt="Facebook">
      </a>
      <a href="https://www.instagram.com/" target="_blank">
        <img src="images/social2.png" alt="Instagram">
      </a>
      <a href="https://www.youtube.com/" target="_blank">
        <img src="images/social3.png" alt="YouTube">
      </a>
    </div>
  </footer>
</body>

</html>
