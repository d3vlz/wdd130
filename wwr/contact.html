<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WWR Contact Us</title>
  <meta name="description" content="Contact White Water Rafting to learn more about our services or to send us any questions.">
  <link rel="stylesheet" href="rafting.css">
</head>
<body>
  <header>
    <!-- Same header as about.html -->
    <h1>White Water Rafting</h1>
  </header>

  <nav>
    <!-- Same navigation as about.html -->
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <main>
    <section class="contact-info">
      <h1>Contact Us</h1>
      <p><strong>Address:</strong> Jose Abelardo Quiñonez Ave.</p>
      <p><strong>Phone:</strong> (51) 123-456-789</p>
      <p><strong>Email:</strong> info@splash.com</p>

      <!-- Embedded Google Map without inline style -->
      <iframe 
        class="map-iframe"
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3793.928286044638!2d-70.24458952406168!3d-18.028531481926795!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x915acf58678f16b1%3A0xae39f92c32c779bd!2sAltozano%20Tacna!5e0!3m2!1sen!2spe!4v1739595399583!5m2!1sen!2spe"
        width="600"
        height="450"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </section>

    <section class="team">
      <h2>Meet Our Team</h2>
      <figure>
        <!-- Example placeholder image from a free placeholder service -->
        <img src="https://via.placeholder.com/200x200.png?text=Employee+1" alt="Employee 1">
        <figcaption>John Doe - Customer Support</figcaption>
      </figure>
      <figure>
        <img src="https://via.placeholder.com/200x200.png?text=Employee+2" alt="Employee 2">
        <figcaption>Jane Smith - Rafting Guide</figcaption>
      </figure>
      <figure>
        <img src="https://via.placeholder.com/200x200.png?text=Employee+3" alt="Employee 3">
        <figcaption>Mike Johnson - Reservations Specialist</figcaption>
      </figure>
    </section>

    <!-- Contact form -->
    <section class="contact-form">
      <h2>Send Us a Message</h2>
      <form action="#" method="post">
        <!-- Name field -->
        <label for="userName">Name:</label>
        <input type="text" id="userName" name="userName">

        <!-- Email field -->
        <label for="userEmail">Email:</label>
        <input type="email" id="userEmail" name="userEmail">

        <!-- Radio buttons for message purpose -->
        <fieldset>
          <legend>Message Purpose</legend>

          <input type="radio" id="purposeGeneral" name="purpose" value="General Inquiry">
          <label for="purposeGeneral">General Inquiry</label>

          <input type="radio" id="purposeReservation" name="purpose" value="Reservation Question">
          <label for="purposeReservation">Reservation Question</label>

          <input type="radio" id="purposeWebsite" name="purpose" value="Website Suggestion">
          <label for="purposeWebsite">Website Suggestion</label>
        </fieldset>

        <!-- Message textarea -->
        <label for="message">Message:</label>
        <textarea id="message" name="message"></textarea>

        <!-- Newsletter subscription checkbox -->
        <input type="checkbox" id="subscribeNewsletter" name="subscribe" value="yes">
        <label for="subscribeNewsletter">Please subscribe me to the monthly newsletter</label>

        <!-- Submit button -->
        <button type="submit" id="sendMessageButton">Send Your Message</button>
      </form>
    </section>
  </main>

  <footer>
    <!-- Same footer as about.html -->
    <p>&copy; 2025 White Water Rafting</p>
    <!-- Link to the Contact Us wireframe image -->
    <p>
      <a href="images/contact-wireframe.jpg">View Contact Us Wireframe</a>
    </p>
  </footer>
</body>
</html>
